name: Deploy VitePress site to Docker

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-docker-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
#        language: [zh, en, ja, zh-hk, zh-tw]
        language: [zh]
    env:
      NODE_OPTIONS: "--max-old-space-size=64000"
      CURRENT_LANGUAGE: ${{ matrix.language }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 9.11.0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Install dependencies
        run: pnpm install
      - name: Build with VitePress for ${{ matrix.language }}
        run: pnpm build
      - name: Get Date
        id: date
        run: echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
      - name: Push Image
        env:
            DOCKER_USERNAME: ${{ secrets.ALIYUN_USERNAME }}
            DOCKER_PASSWORD: ${{ secrets.ALIYUN_PASSWORD }}
            DOCKER_REGISTRY: ${{ secrets.ALIYUN_REGISTRY }}
            SHA: ${{ github.sha }}
            DATE: ${{ steps.date.outputs.date }}
        run: |
          docker build . -t doc-v3:${{ matrix.language }}-latest
          docker login -u $DOCKER_USERNAME -p $DOCKER_PASSWORD $DOCKER_REGISTRY
          docker tag doc-v3:${{ matrix.language }}-latest $DOCKER_REGISTRY/mineadmins/docs:${{ matrix.language }}-$DATE
          docker tag doc-v3:${{ matrix.language }}-latest $DOCKER_REGISTRY/mineadmins/docs:${{ matrix.language }}-latest
          docker push $DOCKER_REGISTRY/mineadmins/docs:${{ matrix.language }}-$DATE
          docker push $DOCKER_REGISTRY/mineadmins/docs:${{ matrix.language }}-latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Trigger n8n deploy webhook
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.MINEADMIN_DEPLOY_WEBHOOK_URL }}
          DEPLOY_WEBHOOK_TOKEN: ${{ secrets.MINEADMIN_DEPLOY_TOKEN }}
          DEPLOY_SERVICE: docs
          DEPLOY_DOCKER_TAG: zh-latest
        run: |
          curl --fail --show-error --silent --get "$DEPLOY_WEBHOOK_URL" \
            --data-urlencode "service=$DEPLOY_SERVICE" \
            --data-urlencode "docker=$DEPLOY_DOCKER_TAG" \
            --header "X-MINEADMIN-DEPLOY: $DEPLOY_WEBHOOK_TOKEN"
